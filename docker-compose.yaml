services:
  init:
    build: ./init
    labels:
      - "traefik.enable=false"
    volumes:
      - datadir:/data
      - status:/status
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SNAPSHOT_URL=${SNAPSHOT_URL:-https://constellationlabs-dashboard-beta.s3.amazonaws.com/intuition-03-11-2026.tar.gz}
      - OFFICIAL_RPC=https://rpc.intuition.systems/http
      - NITRO_RPC=http://nitro:8545
      - BASE_RPC_URL=${BASE_RPC_URL}
    restart: unless-stopped

  nitro:
    build:
      context: .
      dockerfile: nitro/Dockerfile
    platform: linux/amd64
    labels:
      - "traefik.enable=false"
    volumes:
      - datadir:/home/user/.arbitrum
    environment:
      - BASE_RPC_URL=${BASE_RPC_URL}
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    expose:
      - "80"
    networks:
      - default
      - coolify
    restart: unless-stopped

volumes:
  datadir:
  status:

networks:
  coolify:
    external: true
